#This is a Kubernetes Deployment manifest for a Node.js application. 
#It defines a Deployment that manifests a Nodes.js application with 2 replicas. 
#The application is containerized using the image 'prasunachanda/nodejs-app:latest' and listening on  port 3000. 
#The Deployment ensures that the specified number of replicas are running and manages the lifecycle of the application pods.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
  labels:
    app: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      containers:
        - name: nodejs-app
          image: prasunachanda/nodejs-app:latest
          ports:
            - containerPort: 3000